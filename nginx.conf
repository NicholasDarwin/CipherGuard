server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React router – serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service
    location /scan {
        proxy_pass http://cipherguard-api:4000;
        proxy_set_header Host $host;
    }
    location /scans {
        proxy_pass http://cipherguard-api:4000;
        proxy_set_header Host $host;
    }
    location /scan-results {
        proxy_pass http://cipherguard-api:4000;
        proxy_set_header Host $host;
    }
    location /health {
        proxy_pass http://cipherguard-api:4000;
        proxy_set_header Host $host;
    }
}
