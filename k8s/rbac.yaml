# ServiceAccount + RBAC so the API pod can create Jobs
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cipherguard-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cipherguard-job-creator
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cipherguard-api-job-creator
subjects:
  - kind: ServiceAccount
    name: cipherguard-api
roleRef:
  kind: Role
  name: cipherguard-job-creator
  apiGroup: rbac.authorization.k8s.io
